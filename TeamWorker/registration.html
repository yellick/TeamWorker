<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Worker | регистрация</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/preloader.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   
    <div id="preloader">
        <div class="preloader-wrap">
            <div class="preloader-circle" id="circle_1"></div>
            <div class="preloader-circle" id="circle_2"></div>
            <div class="preloader-circle" id="circle_3"></div>
        </div>
    </div>
    
    <main>
        <div id="logo">
            <div class="logo_img">
                <p>TW</p>
            </div>
            <p>Team Worker</p>
        </div>
        
        <form action="">
            <p id="page_type">Регистрация</p>
            <div class="double-input">
                <input name="name" type="text" placeholder="Имя" id="input_name" class="input">
                <input name="surname" type="text" placeholder="Фамилия" id="input_surname" class="input">
            </div>
            
            <input name="email" type="email" placeholder="Почта" id="input_email" class="input">
            <input name="pass" type="text" placeholder="Пароль" id="input_pass" class="input">
            <p id="incorrect_pass">Пароли не совпадают</p>
            <input name="pass_repetition" type="password" placeholder="Повторите пароль" id="input_pass_rep" class="input">
            <input type="submit" value="Создать запись" id="submit_btn_inactive" disabled>
        </form>
        
        <div id="reg_link">
            <p>У вас уже есть учётная запись? <a href="index.html">Войдите!</a></p>
        </div>
    </main>
    
    <script src='js/reg_scrips.js'></script>
</body>
</html>
